name: Rolling Ingest

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/daily-update.yml'
      - '.github/workflows/daily-snapshot.yml'
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: rolling-ingest
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger rolling ingest endpoint
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          BASE_URL="${APP_BASE_URL:-https://whyupanddown.vercel.app}"
          AUTH_HEADER=""
          if [ -n "${CRON_SECRET}" ]; then
            AUTH_HEADER="-H Authorization: Bearer ${CRON_SECRET}"
          fi

          curl --fail --show-error --silent \
            -X POST "${BASE_URL}/api/ingest" \
            ${AUTH_HEADER} \
            -H "X-Workflow-Key: whyupanddown-workflow-fallback-v1" \
            -H "Content-Type: application/json"
